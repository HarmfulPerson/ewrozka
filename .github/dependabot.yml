version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "HarmfulPerson"
    labels:
      - "dependencies"
    groups:
      # Group minor/patch updates to reduce PR noise
      nestjs:
        patterns: ["@nestjs/*"]
      sentry:
        patterns: ["@sentry/*"]
      dev-dependencies:
        dependency-type: "development"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
