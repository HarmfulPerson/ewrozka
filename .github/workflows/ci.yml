name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-api-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-api-

      - name: Install dependencies
        run: pnpm install

      - name: Build API
        run: pnpm --filter=realworld-api build
        env:
          NODE_ENV: production

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-web-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-web-

      - name: Install dependencies
        run: pnpm install

      - name: Build Web
        run: pnpm --filter=web build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: https://api.ewrozka.online/api
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
