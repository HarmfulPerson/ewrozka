name: Deploy Production

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    name: Deploy na produkcję
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Przygotuj .env (base64)
        id: prepare-env
        env:
          ENV_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          echo "b64=$(echo -n "$ENV_CONTENT" | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Deploy na serwer (SSH)
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_B64: ${{ steps.prepare-env.outputs.b64 }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: ENV_B64
          script: |
            set -e
            cd /opt/ewrozka/ewrozka

            printf '%s' "$ENV_B64" | base64 -d > .env.production

            git fetch origin
            git checkout main
            git pull origin main

            # Tag images with git SHA for rollback capability
            SHORT_SHA=$(git rev-parse --short HEAD)
            COMPOSE="docker compose -f docker-compose.prod.yml --env-file .env.production"

            $COMPOSE build

            # Tag built images: sha + latest
            docker tag ewrozka-api:latest ewrozka-api:${SHORT_SHA} 2>/dev/null || true
            docker tag ewrozka-web:latest ewrozka-web:${SHORT_SHA} 2>/dev/null || true

            # Save current SHA for rollback reference
            echo "${SHORT_SHA}" > .last-deploy-prod

            $COMPOSE run --rm api sh -c "cd /app && ./node_modules/.bin/typeorm migration:run -d packages/postgresql-typeorm/dist/data-source.js" || true
            $COMPOSE up -d --remove-orphans

            # Prune only dangling images, keep tagged ones (last 3 deploys)
            docker image prune -f
            # Clean up old tagged images, keep last 3
            for svc in ewrozka-api ewrozka-web; do
              docker images "$svc" --format '{{.Tag}} {{.ID}}' | grep -v latest | sort -r | tail -n +4 | awk '{print $2}' | xargs -r docker rmi 2>/dev/null || true
            done

            echo "Production deployed: ${SHORT_SHA}"
